<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wmsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f4c81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5f99;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wmsAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#wmsBg)"/>

  <!-- Header -->
  <rect width="1920" height="80" fill="#0a1f3d"/>
  <text x="80" y="55" font-size="28" font-weight="bold" fill="white" font-family="sans-serif">Godown AI - WMS Dashboard</text>

  <!-- Left Sidebar -->
  <rect width="250" height="1080" fill="#0a1f3d"/>
  <text x="20" y="130" font-size="14" font-weight="bold" fill="#00d4ff" font-family="sans-serif">WAREHOUSE</text>
  <rect x="20" y="150" width="210" height="35" rx="5" fill="#00d4ff" opacity="0.2"/>
  <text x="35" y="173" font-size="12" fill="white" font-family="sans-serif">Dashboard</text>

  <text x="20" y="230" font-size="14" font-weight="bold" fill="#00d4ff" font-family="sans-serif">DATA</text>
  <text x="35" y="255" font-size="12" fill="#aaa" font-family="sans-serif">Real-time Metrics</text>
  <text x="35" y="285" font-size="12" fill="#aaa" font-family="sans-serif">Inventory</text>

  <!-- Main Content -->
  <rect x="250" y="80" width="1670" height="1000" fill="url(#wmsBg)"/>

  <!-- Metric Cards -->
  <rect x="280" y="120" width="380" height="140" rx="10" fill="#0a1f3d" stroke="#00d4ff" stroke-width="2"/>
  <text x="300" y="145" font-size="12" fill="#aaa" font-family="sans-serif">TOTAL ITEMS</text>
  <text x="300" y="175" font-size="32" font-weight="bold" fill="#00d4ff" font-family="sans-serif">12,847</text>
  <text x="300" y="200" font-size="11" fill="#0f0" font-family="sans-serif">↑ 5.2% from last week</text>

  <rect x="720" y="120" width="380" height="140" rx="10" fill="#0a1f3d" stroke="#00ff88" stroke-width="2"/>
  <text x="740" y="145" font-size="12" fill="#aaa" font-family="sans-serif">AVAILABLE STOCK</text>
  <text x="740" y="175" font-size="32" font-weight="bold" fill="#00ff88" font-family="sans-serif">89.3%</text>
  <text x="740" y="200" font-size="11" fill="#0f0" font-family="sans-serif">Optimal levels</text>

  <rect x="1160" y="120" width="380" height="140" rx="10" fill="#0a1f3d" stroke="#ff6b6b" stroke-width="2"/>
  <text x="1180" y="145" font-size="12" fill="#aaa" font-family="sans-serif">LOW STOCK ALERTS</text>
  <text x="1180" y="175" font-size="32" font-weight="bold" fill="#ff6b6b" font-family="sans-serif">23</text>
  <text x="1180" y="200" font-size="11" fill="#ff9999" font-family="sans-serif">Require attention</text>

  <!-- LLM Integration Card -->
  <rect x="280" y="300" width="1260" height="200" rx="10" fill="#0a1f3d" stroke="url(#wmsAccent)" stroke-width="2"/>
  <text x="300" y="330" font-size="16" font-weight="bold" fill="white" font-family="sans-serif">AI-Powered Insights</text>
  <text x="300" y="360" font-size="12" fill="#aaa" font-family="sans-serif">Real-time LLM Analysis of Warehouse Metrics</text>

  <!-- Simulated AI response -->
  <rect x="300" y="380" width="1240" height="100" rx="5" fill="#0f4c81" stroke="#00d4ff" stroke-width="1"/>
  <text x="320" y="405" font-size="11" fill="#00d4ff" font-family="monospace" font-weight="bold">AI ANALYSIS:</text>
  <text x="320" y="430" font-size="10" fill="#ccc" font-family="monospace">Current inventory suggests seasonal demand peak. Recommend 15% increase in</text>
  <text x="320" y="450" font-size="10" fill="#ccc" font-family="monospace">high-demand SKUs. Predictive shortage risk: 3.2% across category A items.</text>
  <text x="320" y="470" font-size="10" fill="#00ff88" font-family="monospace">Confidence Score: 94.7%</text>

  <!-- Footer -->
  <text x="80" y="1050" font-size="12" fill="#666" font-family="sans-serif">📷 Screenshot your deployed WMS dashboard at wmsai.netlify.app</text>
</svg>